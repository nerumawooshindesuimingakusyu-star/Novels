<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三浦香月 — 小説</title>
<meta name="description" content="三浦香月の小説作品集">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&family=Noto+Serif+JP:wght@300;400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0b0a;
    --surface: #141210;
    --surface2: #1a1714;
    --border: #272320;
    --border2: #322e2a;
    --text: #c4bdb4;
    --text-dim: #857d74;
    --text-faint: #4a4540;
    --accent: #967a56;
    --accent-light: #c4a47a;
    --cream: #e8dfd4;
    --cream-dim: #b8afa6;
    --red: #8b4a3a;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif JP', serif;
    font-weight: 300;
    line-height: 1.9;
    min-height: 100vh;
    cursor: default;
  }

  /* grain */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 48px;
    background: linear-gradient(to bottom, var(--bg) 60%, transparent);
  }

  .nav-name {
    font-family: 'Shippori Mincho', serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--cream);
    letter-spacing: 0.15em;
    text-decoration: none;
  }

  .nav-links {
    display: flex;
    gap: 32px;
    list-style: none;
  }

  .nav-links a {
    font-size: 11px;
    color: var(--text-dim);
    text-decoration: none;
    letter-spacing: 0.2em;
    transition: color 0.3s;
  }

  .nav-links a:hover { color: var(--accent-light); }

  /* ── HERO ── */
  #hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 0 48px 80px;
    position: relative;
    overflow: hidden;
  }

  .hero-line {
    position: absolute;
    top: 0; bottom: 0;
    left: 48px;
    width: 1px;
    background: linear-gradient(to bottom, transparent, var(--border2) 30%, var(--border2) 70%, transparent);
  }

  .hero-eyebrow {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.3em;
    margin-bottom: 24px;
    padding-left: 72px;
    animation: fadeUp 1.2s ease forwards;
    opacity: 0;
  }

  .hero-title {
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(52px, 10vw, 110px);
    font-weight: 700;
    color: var(--cream);
    line-height: 1.1;
    letter-spacing: 0.06em;
    padding-left: 72px;
    animation: fadeUp 1.2s 0.15s ease forwards;
    opacity: 0;
  }

  .hero-subtitle {
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    padding-left: 72px;
    margin-top: 20px;
    animation: fadeUp 1.2s 0.3s ease forwards;
    opacity: 0;
  }

  .hero-scroll {
    position: absolute;
    bottom: 40px;
    right: 48px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--text-faint);
    writing-mode: vertical-rl;
    animation: fadeIn 2s 1s ease forwards;
    opacity: 0;
  }

  .hero-scroll::before {
    content: '';
    width: 1px;
    height: 60px;
    background: linear-gradient(to bottom, var(--text-faint), transparent);
  }

  /* ── WORKS LIST ── */
  #works {
    padding: 80px 0 120px;
    max-width: 1100px;
    margin: 0 auto;
    padding-left: 48px;
    padding-right: 48px;
  }

  .section-label {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.3em;
    margin-bottom: 48px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .works-grid {
    display: grid;
    gap: 0;
  }

  .work-item {
    display: grid;
    grid-template-columns: 64px 1fr auto;
    align-items: start;
    gap: 0 32px;
    padding: 40px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.4s;
    position: relative;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.6s ease, transform 0.6s ease, background 0.3s;
  }

  .work-item.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .work-item::before {
    content: '';
    position: absolute;
    left: -48px; right: -48px;
    top: 0; bottom: 0;
    background: var(--surface);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }

  .work-item:hover::before { opacity: 1; }

  .work-num {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--text-faint);
    letter-spacing: 0.1em;
    padding-top: 4px;
    position: relative;
    z-index: 1;
    transition: color 0.3s;
  }

  .work-item:hover .work-num { color: var(--accent); }

  .work-body { position: relative; z-index: 1; }

  .work-title {
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(20px, 3vw, 26px);
    font-weight: 600;
    color: var(--cream);
    letter-spacing: 0.1em;
    margin-bottom: 10px;
    transition: color 0.3s;
  }

  .work-item:hover .work-title { color: var(--accent-light); }

  .work-catch {
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-bottom: 14px;
    border-left: 2px solid var(--accent);
    padding-left: 12px;
  }

  .work-desc {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 2;
    letter-spacing: 0.04em;
    max-width: 560px;
    margin-bottom: 18px;
  }

  .work-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .work-tag {
    font-size: 10px;
    color: var(--text-faint);
    border: 1px solid var(--border2);
    padding: 3px 10px;
    letter-spacing: 0.08em;
    transition: all 0.3s;
  }

  .work-item:hover .work-tag {
    color: var(--text-dim);
    border-color: var(--border2);
  }

  .work-arrow {
    position: relative;
    z-index: 1;
    font-size: 18px;
    color: var(--text-faint);
    padding-top: 6px;
    transition: all 0.3s;
    font-family: serif;
  }

  .work-item:hover .work-arrow {
    color: var(--accent-light);
    transform: translateX(4px);
  }

  /* loading spinner */
  .loading {
    text-align: center;
    padding: 80px;
    color: var(--text-faint);
    font-size: 13px;
    letter-spacing: 0.2em;
  }

  .error-msg {
    text-align: center;
    padding: 60px;
    color: var(--red);
    font-size: 13px;
    letter-spacing: 0.1em;
    line-height: 2;
  }

  /* ── MODAL (本文) ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(12, 11, 10, 0.92);
    z-index: 200;
    display: flex;
    align-items: stretch;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--surface);
    width: 100%;
    max-width: 760px;
    margin: 0 auto;
    overflow-y: auto;
    position: relative;
    transform: translateY(30px);
    transition: transform 0.4s ease;
    border-left: 1px solid var(--border2);
    border-right: 1px solid var(--border2);
  }

  .modal-overlay.open .modal {
    transform: translateY(0);
  }

  .modal-header {
    position: sticky;
    top: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 24px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 10;
  }

  .modal-header-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--cream);
    letter-spacing: 0.12em;
  }

  .modal-close {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text-dim);
    font-size: 18px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s;
  }

  .modal-close:hover {
    border-color: var(--accent);
    color: var(--accent-light);
  }

  .modal-body {
    padding: 56px 48px 80px;
  }

  .modal-catch {
    font-size: 13px;
    color: var(--accent-light);
    letter-spacing: 0.12em;
    border-left: 2px solid var(--accent);
    padding-left: 16px;
    margin-bottom: 48px;
    line-height: 1.8;
  }

  .modal-text {
    font-size: 15px;
    line-height: 2.2;
    color: var(--text);
    letter-spacing: 0.05em;
    white-space: pre-wrap;
  }

  .modal-text p {
    margin-bottom: 1.6em;
  }

  .modal-footer {
    padding: 32px 48px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .modal-tags { display: flex; gap: 8px; flex-wrap: wrap; }

  .modal-tag {
    font-size: 10px;
    color: var(--text-faint);
    border: 1px solid var(--border2);
    padding: 4px 12px;
    letter-spacing: 0.08em;
  }

  .modal-nav {
    display: flex;
    gap: 16px;
  }

  .modal-nav-btn {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text-dim);
    font-size: 11px;
    padding: 8px 16px;
    letter-spacing: 0.15em;
    cursor: pointer;
    font-family: 'Noto Serif JP', serif;
    transition: all 0.3s;
  }

  .modal-nav-btn:hover {
    border-color: var(--accent);
    color: var(--accent-light);
  }

  .modal-nav-btn:disabled {
    opacity: 0.3;
    cursor: default;
  }

  /* ── ABOUT ── */
  #about {
    border-top: 1px solid var(--border);
    padding: 80px 48px 100px;
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: start;
  }

  .about-label {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.3em;
    margin-bottom: 32px;
  }

  .about-name {
    font-family: 'Shippori Mincho', serif;
    font-size: 36px;
    font-weight: 600;
    color: var(--cream);
    letter-spacing: 0.12em;
    margin-bottom: 24px;
  }

  .about-text {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 2.2;
    letter-spacing: 0.04em;
  }

  .about-stat {
    border-top: 1px solid var(--border);
    padding-top: 48px;
  }

  .stat-num {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 56px;
    color: var(--cream);
    line-height: 1;
    margin-bottom: 8px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.2em;
  }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 32px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.15em;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 700px) {
    nav { padding: 18px 24px; }
    .nav-links { display: none; }
    #hero { padding: 0 24px 64px; }
    .hero-eyebrow, .hero-title, .hero-subtitle { padding-left: 0; }
    .hero-line { display: none; }
    #works { padding: 60px 24px 80px; }
    .work-item { grid-template-columns: 40px 1fr auto; gap: 0 16px; }
    #about { grid-template-columns: 1fr; gap: 40px; padding: 60px 24px; }
    .modal-header, .modal-body, .modal-footer { padding-left: 24px; padding-right: 24px; }
    footer { padding: 24px; flex-direction: column; gap: 8px; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="#" class="nav-name">三浦香月</a>
  <ul class="nav-links">
    <li><a href="#works">作品</a></li>
    <li><a href="#about">著者</a></li>
  </ul>
</nav>

<!-- HERO -->
<section id="hero">
  <div class="hero-line"></div>
  <p class="hero-eyebrow">Fiction — 三浦香月</p>
  <h1 class="hero-title">浪する<br>人々</h1>
  <p class="hero-subtitle">どこにもたどり着けないまま、それでも生きている人々の断章。</p>
  <div class="hero-scroll">scroll</div>
</section>

<!-- WORKS -->
<section id="works">
  <div class="section-label">Works</div>
  <div class="works-grid" id="worksGrid">
    <div class="loading">読み込み中…</div>
  </div>
</section>

<!-- ABOUT -->
<section id="about">
  <div>
    <p class="about-label">Author</p>
    <h2 class="about-name">三浦香月</h2>
    <p class="about-text">日常の隙間に潜む、名付けられない感情を書く。<br>浪する人々、収録。</p>
  </div>
  <div class="about-stat">
    <div class="stat-num" id="statNum">—</div>
    <div class="stat-label">公開作品数</div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <span>© 三浦香月</span>
  <span>All rights reserved</span>
</footer>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <span class="modal-header-title" id="modalTitle"></span>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body">
      <p class="modal-catch" id="modalCatch"></p>
      <div class="modal-text" id="modalText"></div>
    </div>
    <div class="modal-footer">
      <div class="modal-tags" id="modalTags"></div>
      <div class="modal-nav">
        <button class="modal-nav-btn" id="modalPrev">← 前の作品</button>
        <button class="modal-nav-btn" id="modalNext">次の作品 →</button>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
//  ★ ここをApps ScriptのデプロイURLに書き換える ★
//  設定方法はREADME.mdを参照してください
// ============================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzoJ9km_LPtnTUXvNfqIy3fEX17WkO6o4tyjMOj37RD_WKDqlCy1dxmsXmxHlR_mek/exec';

// フォールバック用のデータ（シート設定前に表示されるサンプル）
const FALLBACK_DATA = [
  {
    id: 1,
    title: "浪する人々",
    catchcopy: "透明になっていく、この体はまだここにある。",
    description: "浪人という名の宙吊りの時間。仲間たちが光の中へ消えていくなか、ひとりの部屋に残された「僕」は鏡の中の自分と向き合い、砂時計の砂が青い光となって零れ落ちるのを見ている。夢と現の境が溶け、管楽器の匂いとともによみがえる眩しすぎた過去が、今をいっそう深く侵食する。",
    tags: "#浪人 #喪失 #夢と現実 #孤独",
    body: `そっと目を開けると、いつも通りの、少し年季の入った日焼けた天井が無機質に存在していた。4月1日。仲間たちは意気揚々と新天地に向かっていった。高校生活3年間をすべて肯定され、それを踏み台にしてさらなる高みへと登っていった。僕はどうだろう。昨日までと変わらない日常が、もう1年間続くのだ。もしかしたら、もう1年では足りないかもしれない。肩に重いものが乗っかっていて、病魔に取り憑かれているように、すべてが僕の制御下に置かれていないようだった。

家族の当たりも強くなり、中流階級ゆえ、より一層この1年間は節制を強いられそうだ。自分の人生は自分で切り開くものだし、他人と比べる必要はないなどと言う人がいるが、そんなことを言い出したら僕は大学になど行かない。山奥にこもって俗世を離れ、幸せを見つけ始めてしまうだろう。どうしたって周りと比べて、自分の方が勝っていると信じたいものだ。その観点で言えば、今の僕は一番下にいる。学生でもないし、もちろん稼ぎもない。ニートやフリーランスと呼ばれている人と同じか、それ以下だと自分をずっと卑下している。

ふと気がつくと、部屋の隅に大きな鏡が立っている。昨日まではなかったはずだが、不思議と驚きはなかった。鏡の中の僕は、机に向かって一心不乱にペンを動かしている。その背中には、黒い霧のような塊がのしかかり、時折、耳元で何かを囁いているようだった。僕は鏡の中の自分に声をかけようとしたが、喉が固まって音が出ない。代わりに、鏡の中の僕がゆっくりとこちらを振り向いた。その顔には目も鼻もなく、ただ白紙の願書が貼り付けられているだけだった。

「お前は、いつまでここにいるつもりだ」

白紙の顔が言った。声は僕自身のものだが、どこか遠い地の底から響いてくるように冷たい。

「もう一年か。それとも百年か。時間はたっぷりある。だが、この部屋の砂時計は、砂の代わりに君の寿命をこぼしているよ」

見れば、机の上にあるはずの参考書が、いつの間にか巨大な砂時計に変わっていた。落ちているのは確かに砂ではなく、透き通った青い光の粒だ。それが一粒落ちるたびに、僕の指先が少しずつ透明になっていく。僕は慌ててその光を掬い上げようとしたが、指をすり抜けて床に吸い込まれてしまう。

外からは、新生活を謳歌する若者たちの笑い声が、風に乗って微かに聞こえてきた。その声が聞こえるたび、肩に乗った「重いもの」が一段と重さを増し、僕の体は床にめり込んでいく。

「こんな夢を見た」

そう呟こうとした瞬間、鏡の中の白紙の僕が、筆を置いて立ち上がった。

床に吸い込まれたはずの青い光の粒は、いつの間にか足元で薄暗い水溜まりのように広がっていた。水面が微かに波打つと、ふわりと、あの特有の匂いが立ち昇ってきた。真鍮の冷たさと、柔らかなグリスの混じったような、管楽器の匂いだ。

仄暗い部屋の床に、かつての眩しい情景が浮かび上がる。熱気のこもった講堂。整然と並んだ譜面台の列と、スポットライトを反射して黄金色に輝く楽器の数々。皆の息遣いが一つになる、あの最初の音が鳴り響く直前の、張り詰めた、けれどひどく心地よい静寂。僕はその中心にいた。仲間たちの頼もしげな視線を一身に集め、大きく息を吸い込む。空間を震わせる分厚い和音は、まるで自分たちが世界の中心にいるかのような万能感をくれた。誰もが同じ未来へ向かって、同じ旋律を奏でていると信じて疑わなかったあの夏。

「あの頃は、本当に綺麗だったね」

不意に、水溜まりの底から声がした。それは、今日から新しい街へ旅立ち、僕を置いて遠くの空へと羽ばたいていった、あの日の仲間たちの声が幾重にも重なったような響きだった。彼らの笑顔は光の中に溶け、やがて楽しげな足音とともに彼方へ遠ざかっていく。残されたのは、ただ一人、音の鳴らない部屋で立ち尽くす僕だけだ。

見下ろせば、指先の透明さはすでに手首にまで達していた。美しい音楽の余韻が耳の奥で鳴り止まない分だけ、今のこの部屋の、耳鳴りがするほどの静寂がひどく痛かった。輝かしい過去の残響が、泥濘のように足に絡みつき、今の僕を何よりも鋭く責め立てているのだ。

やがて、足元の水溜まりは音もなく干からびて消えた。光の粒も、彼らの足音も、幻のように空間に溶けてしまった。再び、あの年季の入った日焼けた天井の下に一人、取り残される。

ふと視線をやると、部屋の片隅に、埃をかぶったアコースティック・ギターが壁に立てかけられていた。皆と奏でた華やかな音楽の代わりに、一人静かに爪弾くために置かれたはずのそれは、今の僕と同じように、深い沈黙という病に冒されているようだった。手首まで透明に透き通った腕を伸ばし、せめて一本でも弦に触れようとした。冷たいスチールの感触を確かめたかった。しかし、僕の指先は空しく虚空を切り、幾重にも張られた弦をただ幽霊のようにすり抜けてしまった。

何の音も、鳴らなかった。

僕はもう、この世界に自分の音を響かせることすらできないのだ。窓の外では、残酷なほどに暖かな春の風が吹き抜け、新しい鞄を提げた誰かの背中を力強く押しているのだろう。

「こんな夢を見た」

そう呟いて目を覚ますことができたら、どんなに救われるだろうか。けれど、肩にのしかかる真っ黒な重みだけは、どれだけ体が透明になろうとも、決して消えることはない。僕は静かに目を閉じた。透き通った頬を伝い落ちる一滴の冷たい雫だけが、今の僕が確かにここに存在しているという、ただ一つの証拠だった。

果てしなく続く長い夜は、まだ始まったばかりである。`

// ── データ取得 ──
async function fetchWorks() {
  if (GAS_URL === 'YOUR_GAS_URL_HERE') {
    return FALLBACK_DATA;
  }
  try {
    const res = await fetch(GAS_URL);
    const works = await res.json();
    return works.filter(w => w.title).map((w, i) => ({ id: i + 1, ...w }));
  } catch (e) {
    console.warn('データ読み込み失敗。サンプルデータを表示します。', e);
    return FALLBACK_DATA;
  }
}

// ── レンダリング ──
let allWorks = [];
let currentIndex = 0;

function renderWorks(works) {
  const grid = document.getElementById('worksGrid');
  document.getElementById('statNum').textContent = works.length;
  if (!works.length) {
    grid.innerHTML = '<div class="error-msg">作品が見つかりませんでした。</div>';
    return;
  }
  grid.innerHTML = works.map((w, i) => `
    <div class="work-item" data-index="${i}" role="button" tabindex="0">
      <div class="work-num">${String(i + 1).padStart(2, '0')}.</div>
      <div class="work-body">
        <h2 class="work-title">${w.title}</h2>
        <p class="work-catch">${w.catchcopy || ''}</p>
        <p class="work-desc">${w.description || ''}</p>
        <div class="work-tags">${(w.tags || '').split(/\s+/).filter(Boolean).map(t => `<span class="work-tag">${t}</span>`).join('')}</div>
      </div>
      <div class="work-arrow">→</div>
    </div>
  `).join('');

  // scroll animation
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
  }, { threshold: 0.1 });

  document.querySelectorAll('.work-item').forEach((el, i) => {
    el.style.transitionDelay = `${i * 0.06}s`;
    observer.observe(el);
    el.addEventListener('click', () => openModal(i));
    el.addEventListener('keydown', e => { if (e.key === 'Enter') openModal(i); });
  });
}

// ── モーダル ──
function openModal(index) {
  currentIndex = index;
  const w = allWorks[index];
  document.getElementById('modalTitle').textContent = w.title;
  document.getElementById('modalCatch').textContent = w.catchcopy || '';
  const bodyEl = document.getElementById('modalText');
  bodyEl.innerHTML = (w.body || '').split(/\n\n+/).map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
  document.getElementById('modalTags').innerHTML = (w.tags || '').split(/\s+/).filter(Boolean).map(t => `<span class="modal-tag">${t}</span>`).join('');
  document.getElementById('modalPrev').disabled = index === 0;
  document.getElementById('modalNext').disabled = index === allWorks.length - 1;
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('modal').scrollTop = 0;
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.getElementById('modalPrev').addEventListener('click', () => { if (currentIndex > 0) openModal(currentIndex - 1); });
document.getElementById('modalNext').addEventListener('click', () => { if (currentIndex < allWorks.length - 1) openModal(currentIndex + 1); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── 起動 ──
(async () => {
  allWorks = await fetchWorks();
  renderWorks(allWorks);
})();
</script>
